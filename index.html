<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>AMINA MILK – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0faf4;--bg2:#ffffff;--bg3:#e6f5ec;
  --grn:#16a34a;--grn2:#22c55e;--grn-dk:#14532d;
  --red:#dc2626;
  --txt:#0a1f12;--txt2:#3a6b4f;--txt3:#7aad8a;--txt4:#b8d9c2;
  --bdr:rgba(22,163,74,.18);--bdr2:rgba(22,163,74,.10);
}
html,body{height:100%;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 5%,rgba(22,163,74,.07),transparent),
    radial-gradient(ellipse 60% 60% at 90% 95%,rgba(22,163,74,.05),transparent),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(34,197,94,.03),transparent);
}

/* Grid lines */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(22,163,74,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(22,163,74,.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;width:100%;max-width:420px;}

/* Logo area */
.logo-area{text-align:center;margin-bottom:28px;animation:fadeUp .5s ease both;}
.drop-icon{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--grn),var(--grn2));
  border-radius:22px;display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 14px;
  box-shadow:0 8px 32px rgba(22,163,74,.30);
  animation:float 4s ease-in-out infinite;
  border:2px solid rgba(255,255,255,.3);
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:2rem;font-weight:400;letter-spacing:-.3px;
  color:var(--grn-dk);
}
.logo-sub{
  font-size:.72rem;color:var(--txt3);margin-top:5px;
  letter-spacing:.9px;text-transform:uppercase;font-weight:700;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* Card */
.box{
  background:rgba(255,255,255,.95);
  border:1.5px solid rgba(22,163,74,.14);border-radius:22px;
  padding:30px 26px;
  box-shadow:0 8px 40px rgba(22,163,74,.10),0 2px 8px rgba(0,0,0,.04);
  animation:fadeUp .5s .08s ease both;backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--grn),var(--grn2),transparent);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* Form elements */
.inpG{margin-bottom:15px;position:relative;}
.inpG label{
  display:block;font-size:.68rem;color:var(--txt2);margin-bottom:5px;
  font-weight:700;letter-spacing:.4px;text-transform:uppercase;
}
.inp-wrap{position:relative;}
.inp-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:.9rem;pointer-events:none;color:var(--txt3);
}
.inp{
  width:100%;background:var(--bg3);
  border:1.5px solid rgba(22,163,74,.14);border-radius:11px;
  padding:13px 13px 13px 40px;color:var(--txt);
  font-size:.92rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;
  transition:border .2s,background .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.inp:focus{
  border-color:rgba(22,163,74,.45);background:#fff;
  box-shadow:0 0 0 3px rgba(22,163,74,.10);
}
.inp::placeholder{color:var(--txt4);}

/* Password toggle */
.pwd-toggle{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--txt3);cursor:pointer;
  font-size:.85rem;padding:4px;transition:color .15s;
}
.pwd-toggle:hover{color:var(--txt2);}

/* Submit button */
.btn-submit{
  width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:.92rem;
  letter-spacing:.1px;
  background:linear-gradient(135deg,var(--grn-dk),var(--grn),var(--grn2));
  color:#fff;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;margin-top:6px;
  box-shadow:0 4px 20px rgba(22,163,74,.30);
}
.btn-submit:hover{box-shadow:0 6px 28px rgba(22,163,74,.40);transform:translateY(-1px);}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* Error */
.err{
  background:rgba(220,38,38,.08);border:1.5px solid rgba(220,38,38,.22);
  color:#b91c1c;padding:10px 13px;border-radius:10px;
  font-size:.8rem;margin-bottom:13px;display:none;
  align-items:center;gap:8px;
}
.err.show{display:flex;}

/* Spinner */
.spin{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:sp .55s linear infinite;flex-shrink:0;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* Note */
.note{
  text-align:center;margin-top:16px;
  font-size:.7rem;color:var(--txt3);line-height:1.7;
}
.note span{color:var(--txt2);font-weight:600;}

/* Divider */
.divider{height:1px;background:rgba(22,163,74,.10);margin:18px 0;}

/* Role pills */
.role-pills{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.role-pill{
  padding:4px 12px;border-radius:20px;font-size:.64rem;font-weight:700;
  font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.3px;
}
.role-pill.admin{background:rgba(22,163,74,.12);color:var(--grn-dk);border:1px solid rgba(22,163,74,.22);}
.role-pill.staff{background:rgba(34,197,94,.10);color:#166534;border:1px solid rgba(34,197,94,.22);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="drop-icon">🥛</div>
    <div class="logo-title">Amina Milk</div>
    <div class="logo-sub">Staff &amp; Admin Portal</div>
  </div>
  <div class="box">
    <div class="err" id="err"><span>⚠️</span><span id="errMsg"></span></div>
    <div class="inpG">
      <label>Email Address</label>
      <div class="inp-wrap">
        <span class="inp-icon">✉️</span>
        <input class="inp" id="em" type="email" inputmode="email"
          placeholder="you@aminamilk.com" autocomplete="username">
      </div>
    </div>
    <div class="inpG">
      <label>Password</label>
      <div class="inp-wrap">
        <span class="inp-icon">🔒</span>
        <input class="inp" id="pw" type="password"
          placeholder="Enter your password" autocomplete="current-password">
        <button class="pwd-toggle" type="button" onclick="togglePwd()" id="pwdToggle">👁</button>
      </div>
    </div>
    <button class="btn-submit" id="btn" onclick="doLogin()">Sign In →</button>
    <div class="divider"></div>
    <div class="note">
      <div class="role-pills" style="margin-top:7px">
        <span class="role-pill admin"></span>
        <span class="role-pill staff"></span>
      </div>
    </div>
  </div>
</div>
<script>
function togglePwd(){
  var pw=document.getElementById('pw');
  var btn=document.getElementById('pwdToggle');
  if(pw.type==='password'){pw.type='text';btn.textContent='🙈';}
  else{pw.type='password';btn.textContent='👁';}
}

auth.onAuthStateChanged(async function(u){
  if(!u)return;
  try{
    var role=await ensureUserDoc(u);
    if(role==='admin')window.location.replace('admin.html');
    else if(role==='staff')window.location.replace('milkman.html');
    else await signOut();
  }catch(e){console.error(e);}
});

async function ensureUserDoc(u){
  try{
    var ref=db.collection('users').doc(u.uid);
    var snap=await ref.get();
    if(snap.exists)return snap.data().role||null;
    var adminCheck=await db.collection('users').where('role','==','admin').limit(1).get();
    var role=adminCheck.empty?'admin':null;
    if(role){
      await ref.set({
        name:u.displayName||u.email.split('@')[0],
        email:u.email,role,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),active:true
      });
      return role;
    }
    return null;
  }catch(e){console.error('ensureUserDoc:',e);return null;}
}

async function doLogin(){
  var e=document.getElementById('em').value.trim();
  var p=document.getElementById('pw').value;
  var btn=document.getElementById('btn');
  hideErr();
  if(!e||!p){showErr('Please enter your email and password.');return;}
  if(!/\S+@\S+\.\S+/.test(e)){showErr('Enter a valid email address.');return;}
  btn.innerHTML='<div class="spin"></div>&nbsp;Signing in…';btn.disabled=true;
  try{
    var c=await signIn(e,p);
    var role=await ensureUserDoc(c.user);
    if(!role){
      await signOut();
      showErr('Access denied. Contact your administrator.');
      btn.innerHTML='Sign In →';btn.disabled=false;return;
    }
    await bootstrapSystem(c.user.uid,role);
    window.location.replace(role==='admin'?'admin.html':'milkman.html');
  }catch(er){
    var msg='Login failed. Please try again.';
    if(er.code==='auth/user-not-found'||er.code==='auth/wrong-password'||er.code==='auth/invalid-credential')msg='Invalid email or password.';
    else if(er.code==='auth/too-many-requests')msg='Too many attempts. Please try again later.';
    else if(er.code==='auth/network-request-failed')msg='Network error. Check your connection.';
    else if(er.code==='auth/invalid-email')msg='Invalid email format.';
    else if(er.message)msg=er.message;
    showErr(msg);
    btn.innerHTML='Sign In →';btn.disabled=false;
  }
}

function showErr(m){
  var e=document.getElementById('err');
  document.getElementById('errMsg').textContent=m;
  e.classList.add('show');
}
function hideErr(){document.getElementById('err').classList.remove('show');}

document.getElementById('pw').addEventListener('keydown',function(e){
  if(e.key==='Enter')doLogin();
});
document.getElementById('em').addEventListener('keydown',function(e){
  if(e.key==='Enter')document.getElementById('pw').focus();
});
</script>
</body>
</html>
