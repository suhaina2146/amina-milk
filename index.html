<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>AMINA MILK – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#060d1a;--bg2:#0f1a2e;--bg3:#162236;--acc:#f59e0b;--grn:#10b981;--red:#ef4444;--txt:#f1f5f9;--txt2:#94a3b8;--bdr:rgba(245,158,11,.18);--bdr2:rgba(255,255,255,.07)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 20% 10%,rgba(245,158,11,.1),transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(16,185,129,.07),transparent 55%),var(--bg)}
.box{background:var(--bg2);border:1px solid var(--bdr);border-radius:22px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.7)}
h1{font-family:'Syne',sans-serif;color:var(--acc);font-size:1.7rem;text-align:center;margin-bottom:4px}
.drop{width:64px;height:64px;background:linear-gradient(135deg,var(--acc),#f97316);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px;box-shadow:0 8px 28px rgba(245,158,11,.35)}
.sub{text-align:center;color:var(--txt2);font-size:.82rem;margin-bottom:28px}
.inpG{margin-bottom:14px}
.inpG label{display:block;font-size:.78rem;color:var(--txt2);margin-bottom:5px;font-weight:500}
.inp{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:12px 15px;color:var(--txt);font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:.2s}
.inp:focus{border-color:var(--acc)}
.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;background:linear-gradient(135deg,var(--acc),#f97316);color:#000;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.6;cursor:not-allowed}
.err{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.28);color:#fca5a5;padding:9px 13px;border-radius:8px;font-size:.83rem;margin-bottom:12px;display:none}
.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.note{text-align:center;margin-top:14px;font-size:.73rem;color:var(--txt2)}
</style>
</head>
<body>
<div class="box">
  <div class="drop">🥛</div>
  <h1>AMINA MILK</h1>
  <p class="sub">Staff & Admin Portal</p>
  <div class="err" id="err"></div>
  <div class="inpG"><label>Email</label><input class="inp" id="em" type="email" inputmode="email" placeholder="you@aminamilk.com" autocomplete="username"></div>
  <div class="inpG"><label>Password</label><input class="inp" id="pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
  <p class="note">Redirects automatically based on your role</p>
</div>
<script>
// If already logged in, redirect immediately
auth.onAuthStateChanged(async function(u){
  if(!u) return;
  var role = await ensureUserDoc(u);
  if(role === 'admin')       window.location.replace('admin.html');
  else if(role === 'staff')  window.location.replace('milkman.html');
  else await signOut();
});

// Ensures the Firestore users/{uid} doc exists.
// If the user authenticated but has no doc (e.g. created via Firebase Console),
// this auto-creates it. Returns the role string or null.
async function ensureUserDoc(u){
  try{
    var ref  = db.collection('users').doc(u.uid);
    var snap = await ref.get();

    if(snap.exists){
      return snap.data().role || null;
    }

    // Doc is missing — check if ANY admin exists yet
    var adminCheck = await db.collection('users').where('role','==','admin').limit(1).get();
    var role = adminCheck.empty ? 'admin' : null;   // first ever user becomes admin; otherwise no access

    if(role){
      await ref.set({
        name:      u.displayName || u.email.split('@')[0],
        email:     u.email,
        role:      role,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        active:    true
      });
      return role;
    }

    return null; // user exists in Auth but not granted a role
  }catch(e){
    console.error('ensureUserDoc:', e);
    return null;
  }
}

async function doLogin(){
  var e   = document.getElementById('em').value.trim();
  var p   = document.getElementById('pw').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  err.style.display = 'none';

  if(!e || !p){showErr('Enter email and password.'); return;}
  btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true;

  try{
    var c    = await signIn(e, p);
    var role = await ensureUserDoc(c.user);

    if(!role){
      await signOut();
      showErr('No access. Contact your admin.');
      btn.innerHTML = 'Sign In'; btn.disabled = false;
      return;
    }

    await bootstrapSystem(c.user.uid, role);
    window.location.replace(role === 'admin' ? 'admin.html' : 'milkman.html');

  }catch(er){
    var msg = er.code === 'auth/user-not-found' || er.code === 'auth/wrong-password'
      ? 'Invalid email or password.'
      : er.code === 'auth/too-many-requests'
      ? 'Too many attempts. Try later.'
      : er.code === 'auth/network-request-failed'
      ? 'Network error. Check your connection.'
      : er.message || 'Login failed.';
    showErr(msg);
    btn.innerHTML = 'Sign In'; btn.disabled = false;
  }
}

function showErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}
document.getElementById('pw').addEventListener('keydown', function(e){if(e.key==='Enter') doLogin();});
</script>
</body>
</html>
